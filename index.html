<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMO - Dias de Controle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: #0f0f0f;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(118, 75, 162, 0.4);
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 1rem;
            color: #fff;
        }
        
        p {
            font-size: 16px;
            color: #999;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        button {
            padding: 14px 32px;
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 0.5rem;
            width: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(118, 75, 162, 0.4);
        }
        
        .section {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }
        
        .section.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .counter-number {
            font-size: 64px;
            font-weight: 700;
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 1rem 0;
        }
        
        .counter-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }
        
        .input-group {
            margin-bottom: 1rem;
        }
        
        input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            margin-bottom: 0.5rem;
        }
        
        input:focus {
            outline: none;
            border-color: #764ba2;
        }
        
        .btn-secondary {
            background: #1a1a1a;
            color: #764ba2;
            border: 1px solid #764ba2;
        }
        
        .btn-danger {
            background: #8b3a3a;
            color: white;
            border: none;
        }
        
        .message {
            margin-bottom: 1rem;
            padding: 1rem;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
            line-height: 1.6;
        }
        
        .status-ok {
            background: #0a2a0a;
            border-color: #0f0;
            color: #0f0;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .status-error {
            background: #2a0a0a;
            border-color: #f00;
            color: #f00;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- SPLASH -->
        <div id="splash" class="section active">
            <div class="logo">L</div>
            <h1>LUMO</h1>
            <p>Você não precisa lutar sozinho.</p>
            <button onclick="goToLogin()">Começar</button>
        </div>
        
        <!-- LOGIN -->
        <div id="login" class="section">
            <h1>Bem-vindo</h1>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email: teste@example.com">
                <input type="password" id="password" placeholder="Senha: Teste123456">
            </div>
            <button onclick="handleLogin()">Criar / Entrar</button>
            <button class="btn-secondary" onclick="goToSplash()" style="margin-top: 1rem;">Voltar</button>
        </div>
        
        <!-- HOME -->
        <div id="home" class="section">
            <h1>LUMO</h1>
            <div class="counter-label">Dias de Controle</div>
            <div class="counter-number" id="counter">0</div>
            <p>Você está mais forte do que ontem.</p>
            <button onclick="goToChat()">💬 Estou tentado...</button>
            <button class="btn-danger" onclick="handleRelapse()" style="margin-top: 0.5rem;">📍 Tive uma recaída</button>
            <button class="btn-secondary" onclick="handleLogout()" style="margin-top: 1rem;">Sair</button>
        </div>
        
        <!-- CHAT -->
        <div id="chat" class="section">
            <h1>Chat de Suporte</h1>
            <div id="messages" style="max-height: 300px; overflow-y: auto; margin-bottom: 1rem; text-align: left;">
                <div class="message" style="text-align: center; color: #888;">
                    Fale comigo. Estou aqui para ajudar.
                </div>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="userMessage" placeholder="Escreva algo..." style="margin-bottom: 0;">
                <button onclick="sendMessage()" style="width: 50px; padding: 12px;">→</button>
            </div>
            <button class="btn-secondary" onclick="goToHome()" style="margin-top: 1rem;">Voltar</button>
        </div>
        
    </div>

    <script>
        // ====== FUNÇÕES DE NAVEGAÇÃO ======
        
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        
        function goToSplash() { showSection('splash'); }
        function goToLogin() { showSection('login'); }
        function goToHome() { showSection('home'); updateCounter(); }
        function goToChat() { showSection('chat'); }
        
        // ====== DADOS (localStorage - sem Firebase por enquanto) ======
        
        function saveUser(userData) {
            localStorage.setItem('lumo_user', JSON.stringify(userData));
        }
        
        function getUser() {
            return JSON.parse(localStorage.getItem('lumo_user')) || null;
        }
        
        function updateCounter() {
            const user = getUser();
            if (!user) return;
            
            const startDate = new Date(user.startDate);
            const today = new Date();
            const days = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            document.getElementById('counter').textContent = Math.max(0, days);
        }
        
        // ====== AUTENTICAÇÃO (sem Firebase - apenas localStorage) ======
        
        function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) {
                alert('Email e senha obrigatórios');
                return;
            }
            
            // Salva usuário localmente (sem Firebase)
            saveUser({
                email: email,
                startDate: new Date().toISOString(),
                createdAt: new Date().toISOString()
            });
            
            alert('✅ Login bem-sucedido!');
            goToHome();
        }
        
        function handleLogout() {
            localStorage.removeItem('lumo_user');
            goToSplash();
        }
        
        function handleRelapse() {
            const confirm = window.confirm('Respira. Não acabou.\n\nRecaídas fazem parte do processo.\nO importante é recomeçar agora.\n\nTem certeza?');
            if (confirm) {
                const user = getUser();
                if (user) {
                    user.startDate = new Date().toISOString();
                    saveUser(user);
                    updateCounter();
                    document.getElementById('messages').innerHTML = '<div class="message" style="text-align: center; color: #888;">Fale comigo. Estou aqui para ajudar.</div>';
                }
            }
        }
        
        // ====== CHAT ======
        
        const aiResponses = {
            "sozinho": "Então muda o ambiente agora. Levanta, vai para outro lugar. Seu cérebro está tentando repetir um padrão.",
            "vontade": "Isso passa. Sempre passa. Espera 10 minutos antes de qualquer decisão. Só 10.",
            "aguento": "Você não precisa vencer pra sempre. Só precisa vencer esse momento.",
            "recaída": "Cada decisão agora ainda conta. Você não é seu histórico.",
            "ninguém": "Eu entendo. E você não é o único passando por isso. Fica aqui comigo um pouco.",
            "tentado": "Respira. Sai desse lugar. Bebe água. Isso vai passar."
        };
        
        function sendMessage() {
            const userMessage = document.getElementById('userMessage').value.trim();
            if (!userMessage) return;
            
            const messagesDiv = document.getElementById('messages');
            
            // Adiciona mensagem do usuário
            const userMsg = document.createElement('div');
            userMsg.className = 'message';
            userMsg.style.background = '#764ba2';
            userMsg.style.marginLeft = 'auto';
            userMsg.style.maxWidth = '80%';
            userMsg.textContent = userMessage;
            messagesDiv.appendChild(userMsg);
            
            // Procura resposta
            let aiResponse = "Estou aqui com você. Você consegue passar por isso.";
            for (const [key, response] of Object.entries(aiResponses)) {
                if (userMessage.toLowerCase().includes(key)) {
                    aiResponse = response;
                    break;
                }
            }
            
            // Adiciona resposta da IA
            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message';
                aiMsg.textContent = aiResponse;
                messagesDiv.appendChild(aiMsg);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }, 300);
            
            document.getElementById('userMessage').value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // ====== ENTER PARA ENVIAR ======
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('userMessage') === document.activeElement) {
                sendMessage();
            }
        });
        
        // ====== VERIFICAR SE USUÁRIO JÁ TÁ LOGADO ======
        window.addEventListener('load', () => {
            const user = getUser();
            if (user) {
                goToHome();
            }
        });
    </script>
</body>
</html>

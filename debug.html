
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMO - Dias de Controle</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }
        
        #root {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background: #0f0f0f;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        
        /* SPLASH SCREEN */
        .splash {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }
        
        .splash-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            color: white;
            box-shadow: 0 10px 30px rgba(118, 75, 162, 0.4);
        }
        
        .splash h1 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
        }
        
        .splash p {
            font-size: 16px;
            color: #999;
            line-height: 1.6;
            max-width: 300px;
        }
        
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            color: white;
            margin-top: 1rem;
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(118, 75, 162, 0.4);
        }
        
        .btn-secondary {
            background: #1a1a1a;
            color: #764ba2;
            border: 1px solid #764ba2;
            margin-top: 0.5rem;
        }
        
        .btn-secondary:hover {
            background: #764ba2;
            color: white;
        }
        
        .btn-danger {
            background: #8b3a3a;
            color: white;
        }
        
        .btn-danger:hover {
            background: #a84545;
        }
        
        /* DEBUG SCREEN */
        .debug-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            gap: 1rem;
            overflow-y: auto;
            background: #000;
            animation: fadeIn 0.5s ease-in;
        }
        
        .debug-screen h2 {
            color: #f093fb;
            font-size: 18px;
        }
        
        .debug-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem;
            font-family: monospace;
            font-size: 11px;
            color: #0f0;
            max-height: 200px;
            overflow-y: auto;
            word-break: break-all;
        }
        
        /* LOGIN */
        .login {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
            animation: fadeIn 0.5s ease-in;
        }
        
        .login-form {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .input-group label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input[type="email"], input[type="password"], input[type="text"] {
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        input[type="email"]:focus, input[type="password"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }
        
        /* HOME / CONTADOR */
        .home {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            gap: 2rem;
            overflow-y: auto;
            animation: fadeIn 0.5s ease-in;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        
        .header-menu {
            background: none;
            border: none;
            color: #764ba2;
            font-size: 24px;
            cursor: pointer;
        }
        
        .counter-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem 0;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }
        
        .counter-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .counter-number {
            font-size: 72px;
            font-weight: 700;
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .counter-message {
            font-size: 16px;
            color: #aaa;
            text-align: center;
        }
        
        .buttons-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .btn-full {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-chat {
            background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%);
            color: white;
        }
        
        .btn-chat:active {
            transform: scale(0.98);
        }
        
        .btn-relapse {
            background: #1a1a1a;
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }
        
        .btn-relapse:active {
            background: #e74c3c;
            color: white;
        }
        
        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        
        .modal {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border: 1px solid #333;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }
        
        .modal h2 {
            font-size: 24px;
            color: #fff;
            line-height: 1.3;
        }
        
        .modal p {
            font-size: 14px;
            color: #aaa;
            line-height: 1.6;
        }
        
        .modal-buttons {
            display: flex;
            gap: 1rem;
            flex-direction: column;
        }
        
        /* CHAT */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            gap: 1rem;
            overflow-y: auto;
            animation: fadeIn 0.5s ease-in;
        }
        
        .chat-header {
            font-size: 14px;
            color: #888;
            text-align: center;
            padding: 0.5rem 0;
        }
        
        .chat-messages {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            padding-right: 4px;
        }
        
        .message {
            display: flex;
            gap: 0.5rem;
            animation: slideUp 0.3s ease;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.ai {
            justify-content: flex-start;
        }
        
        .message-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .message.user .message-bubble {
            background: #764ba2;
            color: white;
        }
        
        .message.ai .message-bubble {
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #333;
        }
        
        .chat-input-section {
            display: flex;
            gap: 0.75rem;
            border-top: 1px solid #333;
            padding-top: 1rem;
        }
        
        .chat-input {
            flex: 1;
            padding: 10px 14px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #764ba2;
        }
        
        .chat-send {
            padding: 10px 16px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .chat-send:active {
            transform: scale(0.95);
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px 14px;
            background: #1a1a1a;
            border-radius: 12px;
            width: fit-content;
            border: 1px solid #333;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #764ba2;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-8px); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .quick-missions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .mission-btn {
            background: #1a1a1a;
            border: 1px solid #764ba2;
            color: #764ba2;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mission-btn:hover {
            background: #764ba2;
            color: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        // Firebase Config - COLOQUE SEUS VALORES AQUI
        const firebaseConfig = {
            apiKey: "AIzaSyA-LHWB0o3a-Z21GxPug3cYui579jHQxS4",
            authDomain: "lumo-app-89926.firebaseapp.com",
            projectId: "lumo-app-89926",
            storageBucket: "lumo-app-89926.firebasestorage.app",
            messagingSenderId: "470067283117",
            appId: "1:470067283117:web:174d7e9d11078129953224"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        
        // Debug: Log Firebase initialization
        console.log("🔥 Firebase inicializado com projeto:", firebaseConfig.projectId);

        // Respostas pré-definidas da IA
        const aiResponses = {
            "sozinho": "Então muda o ambiente agora. Levanta, vai para outro lugar. Seu cérebro está tentando repetir um padrão.",
            "vontade": "Isso passa. Sempre passa. Espera 10 minutos antes de qualquer decisão. Só 10.",
            "aguento": "Você não precisa vencer pra sempre. Só precisa vencer esse momento.",
            "recaída": "Cada decisão agora ainda conta. Você não é seu histórico.",
            "ninguém": "Eu entendo. E você não é o único passando por isso. Fica aqui comigo um pouco.",
            "tentado": "Respira. Sai desse lugar. Bebe água. Isso vai passar."
        };

        const App = () => {
            const [screen, setScreen] = React.useState("splash");
            const [user, setUser] = React.useState(null);
            const [email, setEmail] = React.useState("");
            const [password, setPassword] = React.useState("");
            const [counterDays, setCounterDays] = React.useState(0);
            const [showRelapse, setShowRelapse] = React.useState(false);
            const [messages, setMessages] = React.useState([]);
            const [input, setInput] = React.useState("");
            const [loading, setLoading] = React.useState(false);
            const [debugLogs, setDebugLogs] = React.useState(["🎬 App iniciada"]);

            const addLog = (msg) => {
                console.log(msg);
                setDebugLogs(prev => [...prev, msg]);
            };

            React.useEffect(() => {
                addLog("📡 Checando autenticação...");
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    if (currentUser) {
                        addLog(`✅ Usuário autenticado: ${currentUser.email}`);
                        setUser(currentUser);
                        setScreen("home");
                        loadCounterData(currentUser.uid);
                    } else {
                        addLog("❌ Usuário não autenticado");
                    }
                }, (error) => {
                    addLog(`🔴 Erro de auth: ${error.message}`);
                });
                return unsubscribe;
            }, []);

            const loadCounterData = (uid) => {
                addLog(`📊 Carregando dados do contador para UID: ${uid}`);
                db.ref(`users/${uid}/startDate`).on("value", (snapshot) => {
                    if (snapshot.exists()) {
                        addLog(`✅ Data encontrada no Firebase`);
                        const startDate = new Date(snapshot.val());
                        const today = new Date();
                        const days = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
                        setCounterDays(Math.max(0, days));
                        addLog(`📅 Dias calculados: ${Math.max(0, days)}`);
                    } else {
                        addLog(`⚠️ Sem dados no Firebase ainda`);
                    }
                }, (error) => {
                    addLog(`🔴 Erro ao carregar dados: ${error.message}`);
                });
            };

            const handleSignup = async () => {
                if (!email || !password) {
                    addLog("⚠️ Email ou senha vazio");
                    return;
                }
                try {
                    addLog(`📝 Criando conta: ${email}`);
                    const result = await auth.createUserWithEmailAndPassword(email, password);
                    const uid = result.user.uid;
                    addLog(`✅ Conta criada! UID: ${uid}`);
                    
                    addLog(`💾 Salvando dados no Firebase...`);
                    await db.ref(`users/${uid}`).set({
                        email,
                        startDate: new Date().toISOString(),
                        createdAt: new Date().toISOString()
                    });
                    addLog(`✅ Dados salvos!`);
                    
                    setUser(result.user);
                    setScreen("home");
                } catch (err) {
                    addLog(`🔴 Erro signup: ${err.message}`);
                    alert("Erro: " + err.message);
                }
            };

            const handleLogin = async () => {
                if (!email || !password) {
                    addLog("⚠️ Email ou senha vazio");
                    return;
                }
                try {
                    addLog(`🔐 Fazendo login: ${email}`);
                    const result = await auth.signInWithEmailAndPassword(email, password);
                    addLog(`✅ Login bem-sucedido!`);
                    setUser(result.user);
                    setScreen("home");
                } catch (err) {
                    addLog(`🔴 Erro login: ${err.message}`);
                    alert("Erro: " + err.message);
                }
            };

            const handleRelapse = async () => {
                if (!user) return;
                try {
                    await db.ref(`users/${user.uid}/startDate`).set(new Date().toISOString());
                    setCounterDays(0);
                    setShowRelapse(false);
                    setMessages([]);
                } catch (err) {
                    alert("Erro ao atualizar: " + err.message);
                }
            };

            const sendMessage = async () => {
                if (!input.trim()) return;

                const userMessage = input.trim();
                setMessages(prev => [...prev, { role: "user", text: userMessage }]);
                setInput("");
                setLoading(true);

                try {
                    // Procura por palavra-chave nas respostas pré-definidas
                    let aiResponse = "Estou aqui com você. Você consegue passar por isso.";
                    
                    for (const [key, response] of Object.entries(aiResponses)) {
                        if (userMessage.toLowerCase().includes(key)) {
                            aiResponse = response;
                            break;
                        }
                    }

                    // Pequeno delay pra parecer natural (0.5s)
                    await new Promise(resolve => setTimeout(resolve, 500));
                    
                    setMessages(prev => [...prev, { role: "ai", text: aiResponse }]);
                } catch (err) {
                    console.error("Erro ao enviar mensagem:", err);
                    setMessages(prev => [...prev, { role: "ai", text: "Desculpa, algo deu errado. Mas estou aqui com você." }]);
                }

                setLoading(false);
            };

            // SPLASH SCREEN
            if (screen === "splash") {
                return (
                    <div className="container">
                        <div className="splash">
                            <div className="splash-logo">L</div>
                            <div>
                                <h1>LUMO</h1>
                                <p>Você não precisa lutar sozinho.</p>
                            </div>
                            <button className="btn btn-primary" onClick={() => setScreen("login")}>
                                Começar
                            </button>
                            <button 
                                className="btn btn-secondary" 
                                style={{ marginTop: "2rem", fontSize: "11px" }}
                                onClick={() => setScreen("debug")}
                            >
                                🔧 Debug
                            </button>
                        </div>
                    </div>
                );
            }

            // DEBUG SCREEN
            if (screen === "debug") {
                return (
                    <div className="container">
                        <div className="debug-screen">
                            <h2>🔧 Console de Debug</h2>
                            <div className="debug-box">
                                {debugLogs.map((log, idx) => (
                                    <div key={idx}>{log}</div>
                                ))}
                            </div>
                            <button className="btn btn-primary" onClick={() => setScreen("splash")}>
                                ← Voltar
                            </button>
                            <button className="btn btn-secondary" onClick={() => setDebugLogs(["🔄 Logs limpos"])}>
                                Limpar Logs
                            </button>
                        </div>
                    </div>
                );
            }

            // LOGIN SCREEN
            if (screen === "login") {
                return (
                    <div className="container">
                        <div className="login">
                            <h2 style={{ fontSize: "24px", marginBottom: "1rem" }}>Bem-vindo à LUMO</h2>
                            <div className="login-form">
                                <div className="input-group">
                                    <label>Email</label>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        placeholder="seu@email.com"
                                    />
                                </div>
                                <div className="input-group">
                                    <label>Senha</label>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        placeholder="Mínimo 6 caracteres"
                                    />
                                </div>
                                <button className="btn btn-primary" style={{ width: "100%" }} onClick={handleSignup}>
                                    Criar Conta
                                </button>
                                <button className="btn btn-secondary" style={{ width: "100%" }} onClick={handleLogin}>
                                    Entrar
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // HOME SCREEN
            if (screen === "home" && !showRelapse) {
                return (
                    <div className="container">
                        <div className="home">
                            <div className="header">
                                <div className="header-title">LUMO</div>
                                <button className="header-menu" onClick={() => auth.signOut()}>⚙️</button>
                            </div>

                            <div className="counter-section">
                                <div className="counter-label">Dias de Controle</div>
                                <div className="counter-number">{counterDays}</div>
                                <div className="counter-message">Você está mais forte do que ontem.</div>
                            </div>

                            <div className="buttons-section">
                                <button className="btn btn-full btn-chat" onClick={() => setScreen("chat")}>
                                    💬 Estou tentado...
                                </button>
                                <button className="btn btn-full btn-relapse" onClick={() => setShowRelapse(true)}>
                                    📍 Tive uma recaída
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // RELAPSE MODAL
            if (showRelapse) {
                return (
                    <div className="container">
                        <div className="modal-overlay" onClick={() => setShowRelapse(false)}>
                            <div className="modal" onClick={(e) => e.stopPropagation()}>
                                <h2>Respira. Não acabou.</h2>
                                <p>
                                    Recaídas fazem parte do processo. O importante é o que você faz agora. 
                                    Volte para o controle.
                                </p>
                                <div className="modal-buttons">
                                    <button className="btn btn-primary" style={{ width: "100%" }} onClick={handleRelapse}>
                                        Recomeçar
                                    </button>
                                    <button className="btn btn-secondary" style={{ width: "100%" }} onClick={() => setShowRelapse(false)}>
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="home" style={{ display: "none" }}>
                            {/* mantém o background */}
                        </div>
                    </div>
                );
            }

            // CHAT SCREEN
            if (screen === "chat") {
                return (
                    <div className="container">
                        <div className="chat">
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
                                <button style={{ background: "none", border: "none", color: "#764ba2", fontSize: "24px", cursor: "pointer" }} onClick={() => setScreen("home")}>
                                    ←
                                </button>
                                <span className="chat-header">LUMO - Chat de Suporte</span>
                                <div style={{ width: "24px" }}></div>
                            </div>

                            <div className="chat-messages">
                                {messages.length === 0 && (
                                    <div style={{ textAlign: "center", color: "#666", marginTop: "2rem" }}>
                                        <p>Fale comigo. Estou aqui para ajudar.</p>
                                    </div>
                                )}
                                {messages.map((msg, idx) => (
                                    <div key={idx} className={`message ${msg.role}`}>
                                        <div className="message-bubble">{msg.text}</div>
                                    </div>
                                ))}
                                {loading && (
                                    <div className="message ai">
                                        <div className="typing-indicator">
                                            <div className="typing-dot"></div>
                                            <div className="typing-dot"></div>
                                            <div className="typing-dot"></div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="quick-missions">
                                <div style={{ fontSize: "11px", color: "#666", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: "0.5rem" }}>
                                    Missões rápidas:
                                </div>
                                <button className="mission-btn" onClick={() => { setMessages([...messages, { role: "user", text: "Preciso me distrair" }]); sendMessage(); }}>
                                    💧 Beba água
                                </button>
                                <button className="mission-btn" onClick={() => { setMessages([...messages, { role: "user", text: "Vou fazer exercício" }]); sendMessage(); }}>
                                    💪 10 flexões
                                </button>
                                <button className="mission-btn" onClick={() => { setMessages([...messages, { role: "user", text: "Vou sair de onde estou" }]); sendMessage(); }}>
                                    🚶 Saia do quarto
                                </button>
                            </div>

                            <div className="chat-input-section">
                                <input
                                    type="text"
                                    className="chat-input"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyPress={(e) => e.key === "Enter" && sendMessage()}
                                    placeholder="Estou tentado..."
                                    disabled={loading}
                                />
                                <button className="chat-send" onClick={sendMessage} disabled={loading}>
                                    →
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }
        };

        ReactDOM.render(<App />, document.getElementById("root"));
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMO v1.2 - Debug</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #0f0;
            padding: 2rem;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;

        h1 {
            color: #764ba2;

        .log {

        }
        
        .log-entry.success {
            color: #0f0;
            border-left-color: #0f0;
        }
        
        .log-entry.error {
            color: #f00;
            border-left-color: #f00;
        }
        
        .log-entry.info {
            color: #0ff;
            border-left-color: #0ff;
        }
        
        .section {
            margin-bottom: 2rem;
        }
        
        .section h2 {
            color: #764ba2;
            font-size: 16px;
            margin-bottom: 1rem;
        }
        
        .button-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        
        button {
            padding: 10px 16px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
        }
        
        button:hover {
            background: #8b5fb5;
        }
        
        input {
            padding: 8px;
            background: #0f0f0f;
            border: 1px solid #764ba2;
            border-radius: 4px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            margin-bottom: 0.5rem;
            display: block;
            width: 100%;
        }
        
        .status {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        
        .status.ok {
            background: #0a2a0a;
            border: 1px solid #0f0;
            color: #0f0;
        }
        
        .status.error {
            background: #2a0a0a;
            border: 1px solid #f00;
            color: #f00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 LUMO v1.2 - Debug Console</h1>
        
        <div class="section">
            <h2>📡 Firebase Status</h2>
            <div id="firebase-status" class="status error">🔴 Não inicializado</div>
        </div>
        
        <div class="section">
            <h2>📝 Logs</h2>
            <div class="log" id="logs"></div>
            <button onclick="clearLogs()">🗑️ Limpar Logs</button>
        </div>
        
        <div class="section">
            <h2>🔐 Teste de Autenticação</h2>
            <input type="email" id="email" placeholder="Email: teste@example.com">
            <input type="password" id="password" placeholder="Senha: Teste123456">
            <div class="button-group">
                <button onclick="testSignup()">📝 Criar Conta</button>
                <button onclick="testLogin()">🔓 Fazer Login</button>
                <button onclick="testLogout()">🚪 Logout</button>
            </div>
        </div>
        
        <div class="section">
            <h2>💾 Teste de Database</h2>
            <button onclick="testWriteData()">✍️ Escrever Dados</button>
            <button onclick="testReadData()">📖 Ler Dados</button>
        </div>
    </div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA-LHWB0o3a-Z21GxPug3cYui579jHQxS4",
            authDomain: "lumo-app-89926.firebaseapp.com",
            projectId: "lumo-app-89926",
            storageBucket: "lumo-app-89926.firebasestorage.app",
            messagingSenderId: "470067283117",
            appId: "1:470067283117:web:174d7e9d11078129953224"
        };
        
        let auth, db;
        let currentUser = null;
        
        function addLog(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(message);
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        function updateFirebaseStatus(message, isOk = false) {
            const status = document.getElementById('firebase-status');
            status.className = `status ${isOk ? 'ok' : 'error'}`;
            status.textContent = message;
        }
        
        // Inicializar Firebase
        try {
            addLog('🚀 Inicializando Firebase...', 'info');
            firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.database();
            addLog('✅ Firebase inicializado com sucesso!', 'success');
            updateFirebaseStatus('✅ Firebase conectado', true);
        } catch (error) {
            addLog(`❌ Erro ao inicializar Firebase: ${error.message}`, 'error');
            updateFirebaseStatus(`❌ Erro: ${error.message}`);
        }
        
        // Monitorar usuário
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                addLog(`✅ Usuário autenticado: ${user.email}`, 'success');
            } else {
                currentUser = null;
                addLog('❌ Nenhum usuário autenticado', 'error');
            }
        });
        
        // Teste de Signup
        async function testSignup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                addLog('⚠️ Email e senha obrigatórios', 'error');
                return;
            }
            
            try {
                addLog(`📝 Criando conta: ${email}...`, 'info');
                const result = await auth.createUserWithEmailAndPassword(email, password);
                addLog(`✅ Conta criada! UID: ${result.user.uid}`, 'success');
            } catch (error) {
                addLog(`❌ Erro: ${error.message}`, 'error');
            }
        }
        
        // Teste de Login
        async function testLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                addLog('⚠️ Email e senha obrigatórios', 'error');
                return;
            }
            
            try {
                addLog(`🔓 Fazendo login: ${email}...`, 'info');
                const result = await auth.signInWithEmailAndPassword(email, password);
                addLog(`✅ Login bem-sucedido! UID: ${result.user.uid}`, 'success');
            } catch (error) {
                addLog(`❌ Erro: ${error.message}`, 'error');
            }
        }
        
        // Teste de Logout
        async function testLogout() {
            try {
                addLog('🚪 Fazendo logout...', 'info');
                await auth.signOut();
                addLog('✅ Logout bem-sucedido!', 'success');
            } catch (error) {
                addLog(`❌ Erro: ${error.message}`, 'error');
            }
        }
        
        // Teste de escrever dados
        async function testWriteData() {
            if (!currentUser) {
                addLog('⚠️ Você precisa estar autenticado primeiro!', 'error');
                return;
            }
            
            try {
                addLog('✍️ Escrevendo dados no Firebase...', 'info');
                await db.ref(`users/${currentUser.uid}`).set({
                    email: currentUser.email,
                    startDate: new Date().toISOString(),
                    testMessage: 'LUMO está funcionando!'
                });
                addLog('✅ Dados escritos com sucesso!', 'success');
            } catch (error) {
                addLog(`❌ Erro: ${error.message}`, 'error');
            }
        }
        
        // Teste de ler dados
        async function testReadData() {
            if (!currentUser) {
                addLog('⚠️ Você precisa estar autenticado primeiro!', 'error');
                return;
            }
            
            try {
                addLog('📖 Lendo dados do Firebase...', 'info');
                const snapshot = await db.ref(`users/${currentUser.uid}`).get();
                if (snapshot.exists()) {
                    addLog(`✅ Dados encontrados: ${JSON.stringify(snapshot.val())}`, 'success');
                } else {
                    addLog('⚠️ Nenhum dado encontrado', 'error');
                }
            } catch (error) {
                addLog(`❌ Erro: ${error.message}`, 'error');
            }
        }
        
        // Log inicial
        addLog('🎬 LUMO v1.2 iniciada', 'info');
        addLog('Aguardando Firebase...', 'info');
    </script>
</body>
</html>
